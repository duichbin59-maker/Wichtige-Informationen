<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Diagnose - Firebase Test</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <h1>Firebase Diagnose</h1>
    <pre id="log" style="background:#eee; padding:10px; white-space:pre-wrap;"></pre>

    <script>
        const logDiv = document.getElementById("log");
        function log(msg) {
            logDiv.innerText += msg + "\n";
            console.log(msg);
        }

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBw-RNTFz5ACXOZtMHvLWjHYi_HSerw26g",
            authDomain: "collaborativenotes-121ee.firebaseapp.com",
            projectId: "collaborativenotes-121ee",
            storageBucket: "collaborativenotes-121ee.firebasestorage.app",
            messagingSenderId: "337213017720",
            appId: "1:337213017720:web:ea51465f8a0781f86de78d"
        };

        log("1. Initialisiere Firebase...");
        try {
            firebase.initializeApp(firebaseConfig);
            log("✅ Firebase initialisiert");
        } catch(e) {
            log("❌ Fehler: " + e.message);
        }

        const db = firebase.firestore();

        log("2. Versuche, Projekte zu laden...");
        db.collection("projects").get().then(snapshot => {
            log(`✅ Gefunden: ${snapshot.size} Projekte`);
            snapshot.forEach(doc => {
                const data = doc.data();
                log(`   - ID: ${doc.id}, Name: ${data.name || "KEIN NAME!"}`);
            });
            if (snapshot.size === 0) {
                log("⚠️ Keine Projekte. Bitte füge ein Projekt mit einem 'name'-Feld hinzu.");
            }
        }).catch(err => {
            log("❌ Fehler beim Laden: " + err.message);
        });

        log("3. Versuche, Seiten zu laden...");
        db.collection("pages").get().then(snapshot => {
            log(`✅ Gefunden: ${snapshot.size} Seiten`);
            snapshot.forEach(doc => {
                const data = doc.data();
                log(`   - ID: ${doc.id}, Title: ${data.title}, ProjectId: ${data.projectId}`);
            });
        }).catch(err => {
            log("❌ Fehler: " + err.message);
        });

        log("4. Versuche, Kommentare zu laden...");
        db.collection("comments").get().then(snapshot => {
            log(`✅ Gefunden: ${snapshot.size} Kommentare`);
        }).catch(err => {
            log("❌ Fehler: " + err.message);
        });

        log("\n🔍 WICHTIG: Prüfe, ob Projekte ein 'name'-Feld haben. Ohne name werden sie nicht angezeigt.");
    </script>
</body>
</html>
