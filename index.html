<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zusammenarbeit-Dashboard</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --accent: #bb86fc;
            --text: #e0e0e0;
            --secondary: #03dac6;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 15px;
            margin: 0;
            line-height: 1.6;
        }
        .container { max-width: 600px; margin: auto; }
        .project-box {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 5px solid var(--accent);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .page-box {
            background: #252525;
            margin: 15px 0 10px 10px;
            padding: 15px;
            border-radius: 8px;
            border-left: 3px solid var(--secondary);
        }
        .comment-box {
            background: #333;
            margin: 10px 0 0 15px;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.9em;
            color: #bbb;
        }
        h2 { color: var(--accent); margin: 0 0 10px 0; font-size: 1.4em; }
        h3 { color: var(--secondary); margin: 0 0 5px 0; font-size: 1.1em; }
        .refresh-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--accent);
            color: black;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 1.5em;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(187, 134, 252, 0.4);
        }
        .loading { text-align: center; margin-top: 50px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align: center; color: var(--accent);">Projekt-Manager</h1>
    <div id="display-area" class="loading">Daten werden geladen...</div>
</div>

<button class="refresh-btn" onclick="location.reload()">🔄</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBw-RNTFz5ACXOZtMHvLWjHYi_HSerw26g",
        authDomain: "collaborativenotes-121ee.firebaseapp.com",
        projectId: "collaborativenotes-121ee",
        storageBucket: "collaborativenotes-121ee.firebasestorage.app",
        messagingSenderId: "337213017720",
        appId: "1:337213017720:web:ea51465f8a0781f86de78d",
        measurementId: "G-E28VZC2WT6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function startApp() {
        const displayArea = document.getElementById('display-area');
        try {
            // جلب كل البيانات من المجموعات المنفصلة
            const projectsSnap = await getDocs(collection(db, "projects"));
            const pagesSnap = await getDocs(collection(db, "pages"));
            const commentsSnap = await getDocs(collection(db, "comments"));

            let html = "";

            projectsSnap.forEach(projDoc => {
                const project = projDoc.data();
                const projectId = projDoc.id;

                html += `<div class="project-box">
                            <h2>📂 ${project.name || 'Unbenanntes Projekt'}</h2>`;

                // البحث عن الصفحات التابعة لهذا المشروع بناءً على projectId
                pagesSnap.forEach(pageDoc => {
                    const page = pageDoc.data();
                    if (page.projectId === projectId) {
                        html += `<div class="page-box">
                                    <h3>📄 ${page.title || 'Seite'}</h3>`;

                        // البحث عن التعليقات التابعة لهذا المشروع (حسب حقل projectId في صورة التعليقات)
                        commentsSnap.forEach(commDoc => {
                            const comment = commDoc.data();
                            if (comment.projectId === projectId) {
                                html += `<div class="comment-box">💬 ${comment.text || ''}</div>`;
                            }
                        });

                        html += `</div>`;
                    }
                });

                html += `</div>`;
            });

            displayArea.innerHTML = html || "<p>Keine Daten gefunden.</p>";
            displayArea.classList.remove('loading');

        } catch (error) {
            displayArea.innerHTML = "Fehler beim Laden: " + error.message;
        }
    }

    startApp();
</script>

</body>
</html>
