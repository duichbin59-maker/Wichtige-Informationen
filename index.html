<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دفتر تعاوني - نسخة مبسطة</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; direction: rtl; }
        .project { background: #f0f0f0; padding: 16px; margin: 16px 0; border-radius: 16px; }
        .page { background: white; padding: 12px; margin: 8px 0; border-radius: 12px; }
        button { padding: 8px 16px; margin: 4px; border-radius: 20px; border: none; background: #3b82f6; color: white; }
    </style>
</head>
<body>
    <h1>📘 دفتر تعاوني</h1>
    <button id="addProjectBtn">➕ مشروع جديد</button>
    <div id="projects"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBw-RNTFz5ACXOZtMHvLWjHYi_HSerw26g",
            authDomain: "collaborativenotes-121ee.firebaseapp.com",
            projectId: "collaborativenotes-121ee",
            storageBucket: "collaborativenotes-121ee.firebasestorage.app",
            messagingSenderId: "337213017720",
            appId: "1:337213017720:web:ea51465f8a0781f86de78d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function addProject() {
            let name = prompt("اسم المشروع:");
            if (name) await db.collection("projects").add({ name, createdAt: new Date() });
        }

        async function addPage(projectId) {
            let title = prompt("عنوان الصفحة:");
            if (title) await db.collection("pages").add({ title, content: "", projectId, createdAt: new Date() });
        }

        function render() {
            db.collection("projects").orderBy("createdAt").onSnapshot(snapshot => {
                const container = document.getElementById("projects");
                container.innerHTML = "";
                snapshot.forEach(doc => {
                    const project = doc.data();
                    const projectDiv = document.createElement("div");
                    projectDiv.className = "project";
                    projectDiv.innerHTML = `
                        <h2>📁 ${project.name}</h2>
                        <div id="pages-${doc.id}">🔄 جاري تحميل الصفحات...</div>
                        <button onclick="addPage('${doc.id}')">➕ إضافة صفحة</button>
                    `;
                    container.appendChild(projectDiv);
                    
                    // تحميل صفحات هذا المشروع
                    db.collection("pages").where("projectId", "==", doc.id).onSnapshot(pageSnap => {
                        const pagesContainer = document.getElementById(`pages-${doc.id}`);
                        if (!pagesContainer) return;
                        if (pageSnap.empty) {
                            pagesContainer.innerHTML = "📄 لا توجد صفحات. أضف صفحة جديدة.";
                            return;
                        }
                        pagesContainer.innerHTML = "";
                        pageSnap.forEach(pageDoc => {
                            const page = pageDoc.data();
                            const pageDiv = document.createElement("div");
                            pageDiv.className = "page";
                            pageDiv.innerHTML = `
                                <strong>📌 ${page.title}</strong>
                                <p>${page.content || "(فارغ)"}</p>
                                <button onclick="editPage('${pageDoc.id}')">✏️ تحرير</button>
                            `;
                            pagesContainer.appendChild(pageDiv);
                        });
                    });
                });
            });
        }

        window.editPage = async (pageId) => {
            let newContent = prompt("أدخل المحتوى الجديد:");
            if (newContent !== null) await db.collection("pages").doc(pageId).update({ content: newContent });
        };

        document.getElementById("addProjectBtn").onclick = addProject;
        window.addPage = addPage;
        render();
    </script>
</body>
</html>
