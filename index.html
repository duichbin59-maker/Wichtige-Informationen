<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>✨ GedankenFlügel – Gemeinsames Notizbuch</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <!-- Font Awesome 6 (kostenlos) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #fef9f0 0%, #fff5e6 100%);
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            padding: 20px;
            color: #2d2a24;
            direction: ltr; /* Deutsch: Links nach rechts */
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        /* Header */
        .header {
            background: #ffedd5;
            border-radius: 48px;
            padding: 24px 32px;
            margin-bottom: 32px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid #fed7aa;
        }
        h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #b45309, #d97706);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-block;
        }
        .sub {
            color: #78716c;
            margin-top: 8px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            align-items: center;
        }
        /* Große Buttons */
        .btn-primary {
            background: #ea580c;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }
        .btn-primary:hover { background: #c2410c; transform: scale(0.97); }
        .btn-secondary {
            background: #fde68a;
            color: #78350f;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        /* Projekt-Karten */
        .projekt-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            padding: 24px;
            margin-bottom: 28px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.08);
            border: 1px solid #fde68a;
        }
        .projekt-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
            border-bottom: 2px dashed #fed7aa;
            padding-bottom: 12px;
        }
        .projekt-name {
            font-size: 1.8rem;
            font-weight: 700;
            background: transparent;
            border: none;
            padding: 6px 12px;
            border-radius: 40px;
            width: 60%;
            color: #7c2d12;
        }
        .seiten-container {
            margin: 20px 0;
        }
        .seite-card {
            background: #fff7ed;
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #ffedd5;
        }
        .seite-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 12px;
        }
        .seite-titel {
            font-size: 1.5rem;
            font-weight: 600;
            color: #9a3412;
        }
        /* Verbesserter Text-Editor für klare Sicht */
        .text-editor {
            background: #fffbeb;
            border-radius: 28px;
            padding: 16px;
            margin: 12px 0;
        }
        .seite-inhalt {
            width: 100%;
            min-height: 180px;
            padding: 16px;
            font-size: 1rem;
            line-height: 1.5;
            border-radius: 28px;
            border: 1px solid #fed7aa;
            background: #ffffff;
            font-family: monospace;
            resize: vertical;
        }
        .kommentar-bereich {
            background: #fef3c7;
            border-radius: 28px;
            padding: 16px;
            margin-top: 16px;
        }
        .kommentar {
            background: white;
            border-radius: 28px;
            padding: 8px 16px;
            margin: 6px 0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        input, textarea {
            width: 100%;
            padding: 14px;
            border-radius: 48px;
            border: 1px solid #fed7aa;
            background: #fffaf2;
            font-size: 1rem;
            margin: 8px 0;
        }
        .flex-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        hr { margin: 20px 0; border-color: #ffedd5; }
        @media (max-width: 700px) {
            body { padding: 12px; }
            .projekt-name { font-size: 1.4rem; width: 100%; }
            .btn-primary { padding: 12px 18px; font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-feather-alt"></i> GedankenFlügel</h1>
        <div class="sub">
            <span><i class="fas fa-users"></i> Gemeinsam Ideen festhalten & teilen</span>
            <span style="font-style:italic;">✨ Kreativität trifft klare Struktur</span>
        </div>
    </div>
    <div style="display: flex; justify-content: flex-end; margin-bottom: 24px;">
        <button class="btn-primary" id="neuesProjektBtn"><i class="fas fa-plus-circle"></i> Neues Projekt</button>
    </div>
    <div id="projekteContainer"></div>
</div>

<script>
    // Firebase Config (deine Daten)
    const firebaseConfig = {
        apiKey: "AIzaSyBw-RNTFz5ACXOZtMHvLWjHYi_HSerw26g",
        authDomain: "collaborativenotes-121ee.firebaseapp.com",
        projectId: "collaborativenotes-121ee",
        storageBucket: "collaborativenotes-121ee.firebasestorage.app",
        messagingSenderId: "337213017720",
        appId: "1:337213017720:web:ea51465f8a0781f86de78d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const projekteRef = db.collection("projects");
    const seitenRef = db.collection("pages");
    const kommentareRef = db.collection("comments");

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ---- Projekt-Funktionen ----
    async function neuesProjekt() {
        let name = prompt("Wie heißt das neue Projekt? (z.B. „Marketing“, „Reise“)");
        if (!name || name.trim() === "") return;
        await projekteRef.add({ name: name.trim(), createdAt: firebase.firestore.FieldValue.serverTimestamp() });
    }

    async function loescheProjekt(projektId) {
        if (!confirm("⚠️ Projekt und alle Seiten & Kommentare unwiderruflich löschen?")) return;
        const seiten = await seitenRef.where("projectId", "==", projektId).get();
        for (const s of seiten.docs) {
            const kommentare = await kommentareRef.where("pageId", "==", s.id).get();
            for (const k of kommentare.docs) await k.ref.delete();
            await s.ref.delete();
        }
        const projKommentare = await kommentareRef.where("projectId", "==", projektId).where("pageId", "==", null).get();
        for (const k of projKommentare.docs) await k.ref.delete();
        await projekteRef.doc(projektId).delete();
    }

    // ---- Seiten-Funktionen (mit richtigem Editor, der alten Text lädt und bearbeitet) ----
    async function neueSeite(projektId) {
        let titel = prompt("Titel der neuen Seite:");
        if (!titel) titel = "Neue Idee";
        await seitenRef.add({
            title: titel,
            content: "",
            projectId: projektId,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
    }

    async function loescheSeite(seiteId) {
        if (!confirm("Seite und alle Kommentare löschen?")) return;
        const kommentare = await kommentareRef.where("pageId", "==", seiteId).get();
        for (const k of kommentare.docs) await k.ref.delete();
        await seitenRef.doc(seiteId).delete();
    }

    // Verbesserte Bearbeitung: öffnet einen Dialog mit dem aktuellen Inhalt, zum Ändern (nicht nur überschreiben)
    function bearbeiteSeite(seiteId, aktuellerTitel, aktuellerInhalt) {
        // Titel bearbeiten
        let neuerTitel = prompt("Titel bearbeiten:", aktuellerTitel);
        if (neuerTitel !== null && neuerTitel.trim() !== "") {
            seitenRef.doc(seiteId).update({ title: neuerTitel.trim() });
        }
        // Inhalt bearbeiten – mit großem Textfeld, das den alten Inhalt zeigt
        let neuerInhalt = prompt("Inhalt bearbeiten (du kannst den vorhandenen Text ändern oder ergänzen):", aktuellerInhalt);
        if (neuerInhalt !== null) {
            seitenRef.doc(seiteId).update({ content: neuerInhalt });
        }
    }

    // ---- Kommentare ----
    async function addProjektKommentar(projektId, inputId) {
        const input = document.getElementById(inputId);
        const text = input.value.trim();
        if (!text) return;
        await kommentareRef.add({
            text: text,
            projectId: projektId,
            pageId: null,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        input.value = "";
    }

    async function addSeitenKommentar(seiteId, projektId, inputId) {
        const input = document.getElementById(inputId);
        const text = input.value.trim();
        if (!text) return;
        await kommentareRef.add({
            text: text,
            pageId: seiteId,
            projectId: projektId,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        input.value = "";
    }

    // ---- Rendering mit Live-Listener ----
    function renderProjekte() {
        projekteRef.orderBy("createdAt", "desc").onSnapshot(snapshot => {
            const container = document.getElementById("projekteContainer");
            container.innerHTML = "";
            if (snapshot.empty) {
                container.innerHTML = `<div style="background:#fff3e0; border-radius:48px; padding:48px; text-align:center;"><i class="fas fa-tree" style="font-size:48px;"></i><p style="margin-top:16px;">✨ Noch keine Projekte – klicke auf „Neues Projekt“</p></div>`;
                return;
            }
            snapshot.forEach(projDoc => {
                const projektId = projDoc.id;
                const projektName = projDoc.data().name || "Ohne Titel";
                const projDiv = document.createElement("div");
                projDiv.className = "projekt-card";
                projDiv.innerHTML = `
                    <div class="projekt-header">
                        <input type="text" class="projekt-name" value="${escapeHtml(projektName)}" data-id="${projektId}">
                        <button class="btn-secondary btn-danger" onclick="loescheProjekt('${projektId}')"><i class="fas fa-trash-alt"></i> Projekt löschen</button>
                    </div>
                    <div id="seitenListe-${projektId}" class="seiten-container">📄 Seiten werden geladen...</div>
                    <div class="flex-row" style="justify-content: space-between; margin-top: 12px;">
                        <button class="btn-secondary" onclick="neueSeite('${projektId}')"><i class="fas fa-plus"></i> Neue Seite</button>
                    </div>
                    <hr>
                    <div><i class="fas fa-comment-dots"></i> Projekt-Kommentare:</div>
                    <div id="projektKommentare-${projektId}"></div>
                    <div class="flex-row">
                        <input type="text" id="projKommentarInput-${projektId}" placeholder="Dein Kommentar zum Projekt...">
                        <button class="btn-secondary" onclick="addProjektKommentar('${projektId}', 'projKommentarInput-${projektId}')">Senden</button>
                    </div>
                `;
                container.appendChild(projDiv);
                // Projektnamen live änderbar
                const nameInput = projDiv.querySelector(".projekt-name");
                nameInput.addEventListener("change", (e) => {
                    const newName = e.target.value.trim();
                    if (newName) projekteRef.doc(projektId).update({ name: newName });
                });
                ladeSeiten(projektId);
                ladeProjektKommentare(projektId);
            });
        });
    }

    function ladeSeiten(projektId) {
        const container = document.getElementById(`seitenListe-${projektId}`);
        if (!container) return;
        seitenRef.where("projectId", "==", projektId).orderBy("createdAt", "asc").onSnapshot(snapshot => {
            if (snapshot.empty) {
                container.innerHTML = `<div style="background:#fef3c7; border-radius:32px; padding:20px; text-align:center;">📭 Noch keine Seiten. Erstelle deine erste Seite!</div>`;
                return;
            }
            container.innerHTML = "";
            snapshot.forEach(seiteDoc => {
                const seite = seiteDoc.data();
                const seiteId = seiteDoc.id;
                const seiteDiv = document.createElement("div");
                seiteDiv.className = "seite-card";
                seiteDiv.innerHTML = `
                    <div class="seite-header">
                        <span class="seite-titel"><i class="fas fa-file-alt"></i> ${escapeHtml(seite.title)}</span>
                        <div>
                            <button class="btn-secondary" onclick="bearbeiteSeite('${seiteId}', '${escapeHtml(seite.title)}', '${escapeHtml(seite.content)}')"><i class="fas fa-edit"></i> Bearbeiten</button>
                            <button class="btn-secondary btn-danger" onclick="loescheSeite('${seiteId}')"><i class="fas fa-trash"></i> Löschen</button>
                        </div>
                    </div>
                    <div class="text-editor">
                        <div style="font-weight:500; margin-bottom:6px;">📝 Inhalt:</div>
                        <textarea class="seite-inhalt" id="inhalt-${seiteId}" placeholder="Hier steht der Inhalt... du kannst ihn direkt bearbeiten!">${escapeHtml(seite.content || "")}</textarea>
                        <button class="btn-secondary" style="margin-top:8px;" onclick="speichereInhalt('${seiteId}')"><i class="fas fa-save"></i> Speichern</button>
                    </div>
                    <div class="kommentar-bereich">
                        <div id="seitenKommentare-${seiteId}"></div>
                        <div class="flex-row">
                            <input type="text" id="seiteKommentarInput-${seiteId}" placeholder="Kommentar zu dieser Seite...">
                            <button class="btn-secondary" onclick="addSeitenKommentar('${seiteId}', '${projektId}', 'seiteKommentarInput-${seiteId}')"><i class="fas fa-paper-plane"></i> Posten</button>
                        </div>
                    </div>
                `;
                container.appendChild(seiteDiv);
                ladeSeitenKommentare(seiteId);
            });
        });
    }

    // Speicherfunktion für das Textarea (direktes Bearbeiten ohne Dialog)
    window.speichereInhalt = async (seiteId) => {
        const textarea = document.getElementById(`inhalt-${seiteId}`);
        if (textarea) {
            const neuerInhalt = textarea.value;
            await seitenRef.doc(seiteId).update({ content: neuerInhalt });
            // Kleine Rückmeldung
            const btn = textarea.nextElementSibling;
            const originalText = btn.innerText;
            btn.innerText = "✓ Gespeichert!";
            setTimeout(() => { btn.innerText = originalText; }, 1500);
        }
    };

    function ladeSeitenKommentare(seiteId) {
        const container = document.getElementById(`seitenKommentare-${seiteId}`);
        if (!container) return;
        kommentareRef.where("pageId", "==", seiteId).orderBy("timestamp", "asc").onSnapshot(snapshot => {
            container.innerHTML = "";
            if (snapshot.empty) {
                container.innerHTML = `<div style="font-size:0.8rem; color:#a16207;">💬 Noch keine Kommentare – teile deine Gedanken!</div>`;
                return;
            }
            snapshot.forEach(doc => {
                const kom = doc.data();
                const komDiv = document.createElement("div");
                komDiv.className = "kommentar";
                komDiv.innerText = kom.text;
                container.appendChild(komDiv);
            });
        });
    }

    function ladeProjektKommentare(projektId) {
        const container = document.getElementById(`projektKommentare-${projektId}`);
        if (!container) return;
        kommentareRef.where("projectId", "==", projektId).where("pageId", "==", null).orderBy("timestamp", "asc").onSnapshot(snapshot => {
            container.innerHTML = "";
            if (snapshot.empty) {
                container.innerHTML = `<div style="color:#b45309; font-size:0.85rem;">✨ Noch keine Projektkommentare – inspirier andere.</div>`;
                return;
            }
            snapshot.forEach(doc => {
                const kom = doc.data();
                const komDiv = document.createElement("div");
                komDiv.className = "kommentar";
                komDiv.innerText = kom.text;
                container.appendChild(komDiv);
            });
        });
    }

    document.getElementById("neuesProjektBtn").addEventListener("click", neuesProjekt);
    renderProjekte();
</script>
</body>
</html>
