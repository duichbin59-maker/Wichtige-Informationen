<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unser Seelenraum</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #161616;
            --accent-pink: #ffafbd;
            --accent-blue: #2193b0;
            --text-gold: #e0c3fc;
            --text-dim: #888;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, #1a0f1f, #0d0d0d);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        .header { text-align: center; margin-bottom: 25px; }
        h1 { font-family: 'Dancing Script', cursive; font-size: 2.8em; color: var(--accent-pink); margin: 0; }
        
        .sub-header { 
            font-size: 0.85em; color: var(--text-gold); opacity: 0.8; 
            margin-top: 10px; font-style: italic; max-width: 300px; line-height: 1.4;
        }

        .search-container { width: 100%; max-width: 550px; margin-bottom: 20px; }
        .search-input {
            width: 100%; padding: 14px 20px; border-radius: 50px; border: 1px solid #333;
            background: #1a1a1a; color: white; outline: none; box-sizing: border-box;
        }

        .post-card {
            background: var(--card-bg); border-radius: 20px; padding: 20px;
            margin-bottom: 30px; width: 100%; max-width: 550px;
            border: 1px solid rgba(255,255,255,0.03); box-sizing: border-box;
            position: relative;
        }

        .post-meta { font-size: 0.7em; color: var(--text-dim); margin-bottom: 8px; display: block; }
        .post-title { font-size: 1.4em; font-weight: 600; color: var(--text-gold); margin-bottom: 10px; }
        
        /* تنسيق المنشورات والتعليقات الطويلة */
        .content-wrapper {
            position: relative;
            max-height: 160px; 
            overflow: hidden;
            transition: max-height 0.4s ease;
        }
        .comment-wrapper {
            max-height: 80px; /* حد أقصر للتعليقات لتبقى مرتبة */
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .expanded { max-height: none !important; }

        .post-content, .comment-text { font-size: 1.05em; line-height: 1.6; color: #ddd; white-space: pre-wrap; }
        .comment-text { font-size: 0.95em; }

        .show-btn {
            background: none; border: none; color: var(--accent-pink);
            padding: 5px 0; cursor: pointer; font-size: 0.85em; font-weight: 600;
            display: none; margin-bottom: 10px;
        }

        .post-img { 
            width: 100%; max-height: 350px; object-fit: cover; 
            border-radius: 12px; margin-top: 10px; margin-bottom: 15px; 
            display: block; background: #000; 
        }

        .comment-area { border-top: 1px solid #252525; padding-top: 15px; margin-top: 10px; }
        .comment-box { 
            background: rgba(255,255,255,0.03); padding: 12px; border-radius: 10px; 
            margin-bottom: 8px; border-left: 2px solid var(--accent-pink);
        }

        .btn-action { background: none; border: none; font-size: 0.85em; cursor: pointer; font-weight: 500; padding: 8px 0; }
        .btn-edit { color: var(--accent-blue); margin-right: 20px; }
        .btn-delete { color: #ff4b2b; }

        .editor-view {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: none; flex-direction: column; padding: 25px; box-sizing: border-box; z-index: 2000;
        }
        .editor-view input, .editor-view textarea { background: transparent; border: none; color: white; outline: none; width: 100%; margin-bottom: 15px; }

        .floating-btn {
            position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px;
            border-radius: 50%; background: linear-gradient(45deg, var(--accent-blue), var(--accent-pink));
            border: none; font-size: 2em; color: white; cursor: pointer; z-index: 100;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Gedankenstrom</h1>
        <div class="sub-header">Dies ist ein Garten für unsere Gedanken, es ist unsere eigene Welt, es ist das goldene System.</div>
    </div>

    <div class="search-container">
        <input type="text" class="search-input" id="searchBox" placeholder="Suchen..." oninput="doSearch()">
    </div>

    <div id="feedArea" style="width: 100%; display: flex; flex-direction: column; align-items: center;">Laden...</div>

    <button class="floating-btn" onclick="openEditor()">+</button>

    <div id="editorOverlay" class="editor-view">
        <input type="text" id="editTitle" style="font-size: 1.8em;" placeholder="Titel...">
        <input type="text" id="editImg" style="font-size: 0.9em; color: var(--accent-blue);" placeholder="Bild URL (https://...)">
        <textarea id="editContent" style="flex-grow: 1; font-size: 1.2em;" placeholder="Schreibe etwas..."></textarea>
        <div style="display: flex; justify-content: space-between;">
            <button onclick="closeEditor()" style="color:red; background:none; border:none; cursor:pointer;">Abbrechen</button>
            <button onclick="saveToFirebase()" style="background:var(--accent-pink); border:none; padding:10px 30px; border-radius:20px; font-weight:bold; cursor:pointer;">Speichern</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBw-RNTFz5ACXOZtMHvLWjHYi_HSerw26g",
        authDomain: "collaborativenotes-121ee.firebaseapp.com",
        projectId: "collaborativenotes-121ee",
        appId: "1:337213017720:web:ea51465f8a0781f86de78d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let localPosts = [];
    let isEditing = false;
    let currentId = '';

    window.openEditor = (id='', t='', c='', img='') => {
        isEditing = !!id; currentId = id;
        document.getElementById('editTitle').value = t;
        document.getElementById('editContent').value = c;
        document.getElementById('editImg').value = img;
        document.getElementById('editorOverlay').style.display = 'flex';
    };

    window.closeEditor = () => document.getElementById('editorOverlay').style.display = 'none';

    window.saveToFirebase = async () => {
        const t = document.getElementById('editTitle').value;
        const c = document.getElementById('editContent').value;
        const img = document.getElementById('editImg').value;
        if(!t) return;
        if(isEditing) await updateDoc(doc(db, "pages", currentId), { title: t, content: c, imgUrl: img, updatedAt: serverTimestamp() });
        else await addDoc(collection(db, "pages"), { title: t, content: c, imgUrl: img, createdAt: serverTimestamp(), updatedAt: serverTimestamp() });
        location.reload();
    };

    async function init() {
        const q = query(collection(db, "pages"), orderBy("createdAt", "desc"));
        const snap = await getDocs(q);
        const cSnap = await getDocs(collection(db, "comments"));
        localPosts = snap.docs.map(d => ({id: d.id, ...d.data()}));
        render(localPosts, cSnap);
    }

    function render(posts, cSnap) {
        const area = document.getElementById('feedArea');
        let html = "";
        posts.forEach(p => {
            const date = p.createdAt?.toDate().toLocaleString('de-DE') || '';
            html += `<div class="post-card">
                <span class="post-meta">🗓️ ${date}</span>
                <div class="post-title">${p.title}</div>
                
                <div class="content-wrapper" id="p-wrap-${p.id}">
                    <div class="post-content" id="p-con-${p.id}">${p.content || ''}</div>
                </div>
                <button class="show-btn" id="p-btn-${p.id}" onclick="toggleExpand('p-wrap-${p.id}', 'p-btn-${p.id}')">Mehr anzeigen...</button>

                ${p.imgUrl ? `<img src="${p.imgUrl}" class="post-img" onerror="this.style.display='none'">` : ''}
                
                <div class="comment-area">
                    <div id="cl-${p.id}">${renderComs(p.id, cSnap)}</div>
                    <button style="background:none; border:1px dashed #444; color:#888; width:100%; padding:8px; border-radius:10px; margin-top:10px; cursor:pointer;" onclick="addComment('${p.id}')">+ Kommentar</button>
                </div>

                <div style="margin-top:15px; border-top:1px solid #222; padding-top:10px; display:flex;">
                    <button class="btn-action btn-edit" onclick="handleEdit('${p.id}')">📝 Bearbeiten</button>
                    <button class="btn-action btn-delete" onclick="handleDelete('pages','${p.id}')">🗑️ Löschen</button>
                </div>
            </div>`;
        });
        area.innerHTML = html;
        posts.forEach(p => checkHeight('p-con-' + p.id, 'p-btn-' + p.id, 160));
        // تفعيل فحص التعليقات بعد الرسم
        setTimeout(() => {
            cSnap.forEach(d => checkHeight('c-con-' + d.id, 'c-btn-' + d.id, 80));
        }, 100);
    }

    function renderComs(pid, snap) {
        let h = "";
        snap.forEach(d => {
            const c = d.data();
            if(c.pageId === pid) {
                h += `
                <div class="comment-box">
                    <div class="comment-wrapper" id="c-wrap-${d.id}">
                        <div class="comment-text" id="c-con-${d.id}">${c.text}</div>
                    </div>
                    <button class="show-btn" id="c-btn-${d.id}" onclick="toggleExpand('c-wrap-${d.id}', 'c-btn-${d.id}')">Mehr anzeigen...</button>
                    <div style="margin-top:5px;"><span style="color:red; font-size:0.7em; cursor:pointer;" onclick="handleDelete('comments','${d.id}')">Löschen</span></div>
                </div>`;
            }
        });
        return h;
    }

    window.checkHeight = (conId, btnId, limit) => {
        const con = document.getElementById(conId);
        const btn = document.getElementById(btnId);
        if (con && con.scrollHeight > limit) {
            btn.style.display = 'block';
        }
    };

    window.toggleExpand = (wrapId, btnId) => {
        const wrap = document.getElementById(wrapId);
        const btn = document.getElementById(btnId);
        if (wrap.classList.contains('expanded')) {
            wrap.classList.remove('expanded');
            btn.innerText = "Mehr anzeigen...";
        } else {
            wrap.classList.add('expanded');
            btn.innerText = "Weniger anzeigen";
        }
    };

    window.handleEdit = (id) => {
        const p = localPosts.find(x => x.id === id);
        if(p) openEditor(p.id, p.title, p.content || '', p.imgUrl || '');
    };

    window.handleDelete = async (col, id) => {
        if(confirm("Löschen?")) { await deleteDoc(doc(db, col, id)); location.reload(); }
    };

    window.addComment = async (pid) => {
        const txt = prompt("Kommentar:");
        if(txt) { await addDoc(collection(db, "comments"), { pageId: pid, text: txt, createdAt: serverTimestamp() }); location.reload(); }
    };

    window.doSearch = () => {
        const val = document.getElementById('searchBox').value.toLowerCase();
        render(localPosts.filter(p => p.title.toLowerCase().includes(val) || (p.content && p.content.toLowerCase().includes(val))), {forEach:()=>{}});
    };

    init();
</script>
</body>
</html>
