<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unser Gedanken-Feed</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-pink: #ffafbd;
            --accent-blue: #2193b0;
            --text-gold: #e0c3fc;
            --text-dim: #b0b0b0;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, #2c1a32, #121212);
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }

        .header { text-align: center; margin-bottom: 40px; }
        h1 { font-family: 'Dancing Script', cursive; font-size: 3em; color: var(--accent-pink); margin: 0; }
        .quote { font-size: 0.85em; color: var(--text-dim); letter-spacing: 2px; }

        .feed-container { width: 100%; max-width: 600px; }

        /* تصميم يشبه منشورات Reddit ولكن بلمسة ناعمة */
        .post-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }

        .post-project-tag {
            font-size: 0.7em;
            background: linear-gradient(to right, #ffafbd, #ffc3a0);
            color: #000;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 10px;
        }

        .post-title { font-size: 1.6em; font-weight: 600; color: var(--text-gold); margin-bottom: 12px; display: block; }
        
        .post-content {
            font-size: 1.1em;
            line-height: 1.7;
            color: #e0e0e0;
            white-space: pre-wrap; /* يحافظ على الفراغات والأسطر كما كتبت */
            margin-bottom: 20px;
            border-left: 3px solid var(--accent-blue);
            padding-left: 15px;
        }

        .post-footer {
            display: flex;
            gap: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
        }

        /* أزرار التفاعل */
        .action-btn {
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-size: 0.9em;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .action-btn:hover { color: var(--accent-pink); }

        /* المحرر الكبير جداً */
        .editor-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: none; flex-direction: column; padding: 25px;
            box-sizing: border-box; z-index: 2000;
        }
        .editor-input {
            background: transparent; border: none; color: white;
            font-size: 2em; margin-bottom: 20px; outline: none; font-weight: 600;
        }
        .editor-textarea {
            flex-grow: 1; background: transparent; border: none; color: #ccc;
            font-size: 1.4em; line-height: 1.6; outline: none; resize: none;
        }

        .floating-add {
            position: fixed; bottom: 30px; right: 30px;
            width: 65px; height: 65px; border-radius: 50%;
            background: linear-gradient(45deg, var(--accent-blue), var(--accent-pink));
            border: none; font-size: 2em; color: white; cursor: pointer;
            box-shadow: 0 5px 20px rgba(33, 147, 176, 0.5);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Gedankenstrom</h1>
        <div class="quote">FÜR MEINEN ENTJ & MEINE ENFJ</div>
    </div>

    <div class="feed-container" id="feed">
        <p style="text-align:center;">Sterne werden geladen...</p>
    </div>

    <button class="floating-add" onclick="openEditor('pages')">+</button>

    <div id="editorModal" class="editor-modal">
        <input type="text" id="editTitle" class="editor-input" placeholder="Titel deiner Vision...">
        <textarea id="editContent" class="editor-textarea" placeholder="Schreibe frei وسوف تجد الراحة هنا..."></textarea>
        <div style="display:flex; justify-content: space-between; margin-top: 20px;">
            <button class="action-btn" style="color: #ff4b2b; font-size: 1.2em;" onclick="closeEditor()">Abbrechen</button>
            <button class="action-btn" style="color: var(--accent-blue); font-size: 1.5em; font-weight: bold;" onclick="saveData()">Veröffentlichen</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBw-RNTFz5ACXOZtMHvLWjHYi_HSerw26g",
        authDomain: "collaborativenotes-121ee.firebaseapp.com",
        projectId: "collaborativenotes-121ee",
        appId: "1:337213017720:web:ea51465f8a0781f86de78d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let editMode = false;
    let currentId = '';

    window.openEditor = (mode, id = '', title = '', content = '') => {
        editMode = !!id;
        currentId = id;
        document.getElementById('editTitle').value = title;
        document.getElementById('editContent').value = content;
        document.getElementById('editorModal').style.display = 'flex';
    };

    window.closeEditor = () => document.getElementById('editorModal').style.display = 'none';

    window.saveData = async () => {
        const title = document.getElementById('editTitle').value;
        const content = document.getElementById('editContent').value;
        if(!title) return;

        if(editMode) {
            await updateDoc(doc(db, "pages", currentId), { title, content });
        } else {
            await addDoc(collection(db, "pages"), { title, content, createdAt: new Date() });
        }
        location.reload();
    };

    window.deletePost = async (id) => {
        if(confirm("Diesen Gedanken löschen?")) {
            await deleteDoc(doc(db, "pages", id));
            location.reload();
        }
    };

    async function loadFeed() {
        const feed = document.getElementById('feed');
        const q = query(collection(db, "pages")); 
        const snap = await getDocs(q);
        
        let html = "";
        if (snap.empty) {
            html = "<p style='text-align:center'>Noch keine Gedanken geteilt. Klicke auf +, um zu beginnen.</p>";
        }

        snap.forEach(d => {
            const post = d.data();
            html += `
                <div class="post-card">
                    <span class="post-project-tag">Offener Gedanke</span>
                    <div class="post-title">${post.title}</div>
                    <div class="post-content">${post.content || ''}</div>
                    <div class="post-footer">
                        <button class="action-btn" onclick="openEditor('pages', '${d.id}', '${post.title}', \`${post.content || ''}\`)">📝 Bearbeiten</button>
                        <button class="action-btn" onclick="deletePost('${d.id}')">🗑️ Löschen</button>
                    </div>
                </div>
            `;
        });
        feed.innerHTML = html;
    }

    loadFeed();
</script>
</body>
</html>
