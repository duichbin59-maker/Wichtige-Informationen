<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Einfaches Notizbuch</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f8;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 1000px;
            margin: auto;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            margin: 5px;
        }
        button.danger {
            background: #ef4444;
        }
        .projekt {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .projekt-titel {
            font-size: 1.8rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .seite {
            background: #fef9e6;
            border-radius: 20px;
            padding: 16px;
            margin: 16px 0;
        }
        .seite-titel {
            font-size: 1.3rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }
        textarea {
            width: 100%;
            min-height: 150px;
            padding: 12px;
            font-size: 1rem;
            border-radius: 20px;
            border: 1px solid #ccc;
            font-family: monospace;
            margin: 10px 0;
        }
        .kommentar {
            background: #eef2ff;
            padding: 6px 12px;
            border-radius: 20px;
            margin: 5px 0;
        }
        input, textarea {
            width: 100%;
            margin: 5px 0;
            padding: 10px;
            border-radius: 20px;
            border: 1px solid #ccc;
        }
        .flex {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        hr {
            margin: 15px 0;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📒 Gemeinsames Notizbuch</h1>
    <button id="neuesProjekt">➕ Neues Projekt</button>
    <div id="projekteListe"></div>
</div>

<script>
    // Firebase Konfiguration (deine Daten)
    const firebaseConfig = {
        apiKey: "AIzaSyBw-RNTFz5ACXOZtMHvLWjHYi_HSerw26g",
        authDomain: "collaborativenotes-121ee.firebaseapp.com",
        projectId: "collaborativenotes-121ee",
        storageBucket: "collaborativenotes-121ee.firebasestorage.app",
        messagingSenderId: "337213017720",
        appId: "1:337213017720:web:ea51465f8a0781f86de78d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Referenzen
    const projekte = db.collection("projects");
    const seiten = db.collection("pages");
    const kommentare = db.collection("comments");

    // Hilfsfunktion HTML-escape
    function esc(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Neues Projekt
    document.getElementById("neuesProjekt").onclick = async () => {
        let name = prompt("Projektname:");
        if (name) await projekte.add({ name: name.trim(), createdAt: new Date() });
    };

    // Projekt löschen
    async function deleteProjekt(projId) {
        if (!confirm("Projekt und alle Seiten löschen?")) return;
        // Seiten löschen
        const seitenSnap = await seiten.where("projectId", "==", projId).get();
        for (let doc of seitenSnap.docs) {
            // Kommentare der Seite löschen
            const kommentareSnap = await kommentare.where("pageId", "==", doc.id).get();
            for (let k of kommentareSnap.docs) await k.ref.delete();
            await doc.ref.delete();
        }
        // Kommentare des Projekts löschen
        const projKommentare = await kommentare.where("projectId", "==", projId).where("pageId", "==", null).get();
        for (let k of projKommentare.docs) await k.ref.delete();
        await projekte.doc(projId).delete();
    }

    // Neue Seite
    async function addSeite(projId) {
        let titel = prompt("Titel der Seite:");
        if (!titel) titel = "Neue Seite";
        await seiten.add({
            title: titel,
            content: "",
            projectId: projId,
            createdAt: new Date()
        });
    }

    // Seite löschen
    async function deleteSeite(seiteId) {
        if (!confirm("Seite löschen?")) return;
        const kommentareSnap = await kommentare.where("pageId", "==", seiteId).get();
        for (let k of kommentareSnap.docs) await k.ref.delete();
        await seiten.doc(seiteId).delete();
    }

    // Inhalt speichern (aus dem Textarea)
    window.speichereInhalt = async (seiteId) => {
        const textarea = document.getElementById(`inhalt-${seiteId}`);
        if (textarea) {
            await seiten.doc(seiteId).update({ content: textarea.value });
            alert("Gespeichert!");
        }
    };

    // Kommentar zu Seite hinzufügen
    window.addSeitenKommentar = async (seiteId, projId) => {
        const input = document.getElementById(`kommentarInput-${seiteId}`);
        const text = input.value.trim();
        if (!text) return;
        await kommentare.add({
            text: text,
            pageId: seiteId,
            projectId: projId,
            timestamp: new Date()
        });
        input.value = "";
    };

    // Kommentar zu Projekt hinzufügen
    window.addProjektKommentar = async (projId) => {
        const input = document.getElementById(`projKommentar-${projId}`);
        const text = input.value.trim();
        if (!text) return;
        await kommentare.add({
            text: text,
            pageId: null,
            projectId: projId,
            timestamp: new Date()
        });
        input.value = "";
    };

    // Hauptfunktion: Alle Projekte anzeigen
    projekte.orderBy("createdAt", "desc").onSnapshot((snapshot) => {
        const container = document.getElementById("projekteListe");
        container.innerHTML = "";
        if (snapshot.empty) {
            container.innerHTML = "<p>Keine Projekte. Klicke auf 'Neues Projekt'.</p>";
            return;
        }
        snapshot.forEach(projDoc => {
            const projId = projDoc.id;
            const projName = projDoc.data().name || "Unbenannt";
            const projDiv = document.createElement("div");
            projDiv.className = "projekt";
            projDiv.innerHTML = `
                <div class="projekt-titel">
                    <span>📁 ${esc(projName)}</span>
                    <button class="danger" onclick="deleteProjekt('${projId}')">Löschen</button>
                </div>
                <div id="seiten-${projId}">📄 Seiten werden geladen...</div>
                <button onclick="addSeite('${projId}')">➕ Neue Seite</button>
                <hr>
                <div><strong>Projekt-Kommentare:</strong></div>
                <div id="projKommentare-${projId}"></div>
                <div class="flex">
                    <input type="text" id="projKommentar-${projId}" placeholder="Kommentar zum Projekt...">
                    <button onclick="addProjektKommentar('${projId}')">Senden</button>
                </div>
            `;
            container.appendChild(projDiv);
            
            // Seiten für dieses Projekt laden
            seiten.where("projectId", "==", projId).orderBy("createdAt", "asc").onSnapshot(seitenSnap => {
                const seitenContainer = document.getElementById(`seiten-${projId}`);
                if (!seitenContainer) return;
                if (seitenSnap.empty) {
                    seitenContainer.innerHTML = "<p>Keine Seiten. Erstelle eine neue Seite.</p>";
                    return;
                }
                seitenContainer.innerHTML = "";
                seitenSnap.forEach(seiteDoc => {
                    const seite = seiteDoc.data();
                    const seiteId = seiteDoc.id;
                    const seiteDiv = document.createElement("div");
                    seiteDiv.className = "seite";
                    seiteDiv.innerHTML = `
                        <div class="seite-titel">
                            <span>📄 ${esc(seite.title)}</span>
                            <button class="danger" onclick="deleteSeite('${seiteId}')">Seite löschen</button>
                        </div>
                        <textarea id="inhalt-${seiteId}" placeholder="Schreibe deine Gedanken...">${esc(seite.content || "")}</textarea>
                        <button onclick="speichereInhalt('${seiteId}')">💾 Inhalt speichern</button>
                        <div style="margin-top: 12px;"><strong>💬 Kommentare:</strong></div>
                        <div id="kommentare-${seiteId}"></div>
                        <div class="flex">
                            <input type="text" id="kommentarInput-${seiteId}" placeholder="Dein Kommentar...">
                            <button onclick="addSeitenKommentar('${seiteId}', '${projId}')">Posten</button>
                        </div>
                    `;
                    seitenContainer.appendChild(seiteDiv);
                    
                    // Kommentare für diese Seite laden
                    kommentare.where("pageId", "==", seiteId).orderBy("timestamp", "asc").onSnapshot(komSnap => {
                        const komContainer = document.getElementById(`kommentare-${seiteId}`);
                        if (!komContainer) return;
                        komContainer.innerHTML = "";
                        if (komSnap.empty) {
                            komContainer.innerHTML = "<p>Noch keine Kommentare.</p>";
                            return;
                        }
                        komSnap.forEach(komDoc => {
                            const kom = komDoc.data();
                            const komDiv = document.createElement("div");
                            komDiv.className = "kommentar";
                            komDiv.innerText = kom.text;
                            komContainer.appendChild(komDiv);
                        });
                    });
                });
            });
            
            // Projekt-Kommentare laden
            kommentare.where("projectId", "==", projId).where("pageId", "==", null).orderBy("timestamp", "asc").onSnapshot(komSnap => {
                const komContainer = document.getElementById(`projKommentare-${projId}`);
                if (!komContainer) return;
                komContainer.innerHTML = "";
                if (komSnap.empty) {
                    komContainer.innerHTML = "<p>Keine Kommentare.</p>";
                    return;
                }
                komSnap.forEach(komDoc => {
                    const kom = komDoc.data();
                    const komDiv = document.createElement("div");
                    komDiv.className = "kommentar";
                    komDiv.innerText = kom.text;
                    komContainer.appendChild(komDiv);
                });
            });
        });
    });
</script>
</body>
    </html>
