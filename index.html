<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unser Seelenraum</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #161616;
            --accent-pink: #ffafbd;
            --accent-blue: #2193b0;
            --text-gold: #e0c3fc;
            --text-dim: #999;
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }

        .header { text-align: center; margin-bottom: 25px; }
        h1 { font-family: 'Dancing Script', cursive; font-size: 2.8em; color: var(--accent-pink); margin: 0; text-shadow: 0 0 15px rgba(255,175,189,0.3); }
        
        /* البحث */
        .search-container { width: 100%; max-width: 550px; margin-bottom: 20px; }
        .search-input {
            width: 100%; padding: 12px 20px; border-radius: 50px; border: 1px solid #333;
            background: #1a1a1a; color: white; outline: none; box-sizing: border-box;
        }

        /* بطاقة المنشور */
        .post-card {
            background: var(--card-bg); border-radius: 20px; padding: 20px;
            margin-bottom: 25px; width: 100%; max-width: 550px;
            border: 1px solid rgba(255,255,255,0.03); box-sizing: border-box;
        }

        .post-meta { font-size: 0.7em; color: var(--text-dim); margin-bottom: 8px; }
        .post-title { font-size: 1.4em; font-weight: 600; color: var(--text-gold); margin-bottom: 10px; }
        .post-content { font-size: 1.05em; line-height: 1.6; color: #ddd; white-space: pre-wrap; margin-bottom: 15px; }
        
        .post-img { width: 100%; border-radius: 12px; margin-bottom: 15px; }

        /* التعليقات */
        .comment-area { border-top: 1px solid #222; padding-top: 15px; margin-top: 15px; }
        .comment-box { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 10px; margin-bottom: 8px; font-size: 0.9em; }
        .comment-btns { font-size: 0.75em; color: var(--accent-blue); cursor: pointer; margin-top: 5px; opacity: 0.6; }

        /* المحرر */
        .editor-view {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: none; flex-direction: column; padding: 20px; box-sizing: border-box; z-index: 1000;
        }
        .editor-view input, .editor-view textarea {
            background: transparent; border: none; color: white; outline: none; width: 100%; margin-bottom: 15px;
        }

        .floating-btn {
            position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px;
            border-radius: 50%; background: linear-gradient(45deg, var(--accent-blue), var(--accent-pink));
            border: none; font-size: 1.8em; color: white; box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Gedankenstrom</h1>
        <div style="font-size: 0.8em; opacity: 0.5;">FÜR UNS ZWEI</div>
    </div>

    <div class="search-container">
        <input type="text" class="search-input" id="searchBox" placeholder="Suchen..." oninput="doSearch()">
    </div>

    <div id="feedArea" style="width: 100%; display: flex; flex-direction: column; align-items: center;">Laden...</div>

    <button class="floating-btn" onclick="openMe()">+</button>

    <div id="editor" class="editor-view">
        <input type="text" id="et" style="font-size: 1.8em;" placeholder="Titel...">
        <input type="text" id="ei" style="font-size: 0.9em; color: var(--accent-blue);" placeholder="Bild-URL (Optional)...">
        <textarea id="ec" style="flex-grow: 1; font-size: 1.2em;" placeholder="Schreibe hier..."></textarea>
        <div style="display: flex; justify-content: space-between;">
            <button onclick="closeMe()" style="background:none; border:none; color:red;">Abbrechen</button>
            <button onclick="sendIt()" style="background:var(--accent-pink); border:none; padding:10px 30px; border-radius:20px; font-weight:bold;">Teilen</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBw-RNTFz5ACXOZtMHvLWjHYi_HSerw26g",
        authDomain: "collaborativenotes-121ee.firebaseapp.com",
        projectId: "collaborativenotes-121ee",
        appId: "1:337213017720:web:ea51465f8a0781f86de78d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let postsData = [];
    let isEdit = false;
    let editId = '';

    window.openMe = (id='', t='', c='', img='') => {
        isEdit = !!id; editId = id;
        document.getElementById('et').value = t;
        document.getElementById('ec').value = c;
        document.getElementById('ei').value = img;
        document.getElementById('editor').style.display = 'flex';
    };

    window.closeMe = () => document.getElementById('editor').style.display = 'none';

    window.sendIt = async () => {
        const t = document.getElementById('et').value;
        const c = document.getElementById('ec').value;
        const img = document.getElementById('ei').value;
        if(!t) return;

        if(isEdit) {
            await updateDoc(doc(db, "pages", editId), { title: t, content: c, imgUrl: img, updatedAt: serverTimestamp() });
        } else {
            await addDoc(collection(db, "pages"), { title: t, content: c, imgUrl: img, createdAt: serverTimestamp(), updatedAt: serverTimestamp() });
        }
        location.reload();
    };

    async function load() {
        const q = query(collection(db, "pages"), orderBy("createdAt", "desc"));
        const snap = await getDocs(q);
        const cSnap = await getDocs(collection(db, "comments"));
        postsData = snap.docs.map(d => ({id: d.id, ...d.data()}));
        draw(postsData, cSnap);
    }

    function draw(posts, cSnap) {
        const area = document.getElementById('feedArea');
        let h = "";
        posts.forEach(p => {
            const date = p.createdAt?.toDate().toLocaleString('de-DE') || '';
            const uDate = p.updatedAt?.toDate().toLocaleString('de-DE') || '';
            h += `<div class="post-card">
                <div class="post-meta">🗓️ ${date} ${uDate!=date?' | ✏️ '+uDate:''}</div>
                <div class="post-title">${p.title}</div>
                <div class="post-content">${p.content || ''}</div>
                ${p.imgUrl ? `<img src="${p.imgUrl}" class="post-img">`:''}
                <div class="comment-area">
                    <div id="cl-${p.id}">${drawComs(p.id, cSnap)}</div>
                    <div style="color:var(--text-dim); font-size:0.8em; margin-top:10px;" onclick="addC('${p.id}')">+ Kommentar</div>
                </div>
                <div style="margin-top:15px; font-size:0.75em; opacity:0.3; display:flex; gap:15px;">
                    <span onclick="openMe('${p.id}','${p.title}','${p.content||''}','${p.imgUrl||''}')">Bearbeiten</span>
                    <span onclick="del('pages','${p.id}')">Löschen</span>
                </div>
            </div>`;
        });
        area.innerHTML = h;
    }

    function drawComs(pid, snap) {
        let h = "";
        snap.forEach(d => {
            const c = d.data();
            if(c.pageId === pid) h += `<div class="comment-box">${c.text}
                <div class="comment-btns"><span onclick="del('comments','${d.id}')">Löschen</span></div>
            </div>`;
        });
        return h;
    }

    window.addC = async (pid) => {
        const txt = prompt("Dein Kommentar:");
        if(txt) { await addDoc(collection(db, "comments"), { pageId: pid, text: txt }); location.reload(); }
    };

    window.del = async (co, id) => { if(confirm("Löschen?")) { await deleteDoc(doc(db, co, id)); location.reload(); } };

    window.doSearch = () => {
        const s = document.getElementById('searchBox').value.toLowerCase();
        draw(postsData.filter(p => p.title.toLowerCase().includes(s) || (p.content && p.content.toLowerCase().includes(s))), {forEach:()=>{}});
    };

    load();
</script>
</body>
</html>
